        uuid:
          type: string
          description: Unik identifikator for duplikatkontroll
          format: uuid
    JsonNode:
      type: object
      description: |
        Det benyttes en dot-notasjon for selve filteret. Det legges opp til at det ikke er nødvendig med operator for "er lik" og "er en av". Spesifisert null tolkes som = null,
        men kan også gjøres mer eksplisitt med egen operator.

        - ```json
          { "felt.navn": <verdi> }
          ```
          matcher på felt.navn=verdi
        - ```json
          { "felt.navn": [<verdi1>, <verdi2> }
          ```
           matcher på felt.navn = verdi1 *eller* felt.navn = verdi2.
        - ```json
          { "felt.navn": null}
          ```
          matcher på felt.navn = null
      enum:
      - fordeling.enhet.nr
      - fordeling.mappe.id
      - fordeling.medarbeider.navident
      - fordeling.bruker.ident
      - status
    PatchOppgaveRequest:
      required:
