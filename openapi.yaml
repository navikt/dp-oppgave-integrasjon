  /api/v2/oppgaver/sok:
    post:
      tags:
      - v2 Oppgave (under arbeid)
      summary: Under arbeid! Søk etter oppgaver
      description: |
        fordeling.enhet.nr må som minimum angis i søket (vil utvides med flere søkemuligheter, i.e bruker.ident)

         **Evaluering ved manglende tilgang**

         - fordeling.enhet.nr angitt, og ingen tilgang til enhet: Avvises direkte (403).
         - fordeling.enhet.nr angitt, men populasjonstilgang avvist for et eller flere av resultatene: bruker.ident, beskrivelse, kommentarer, nokkelord skjermes
      operationId: sokOppgaver
      parameters:
      - name: include
        in: query
        description: |
          Det er løsninger som per i dag viser deler av den siste kommentaren i arbeidslister (ev. beskrivelsen dersom det ikke er kommentert noe)

          Kommentarer (og beskrivelsen) er i utgangspunktet ustrukturert fritekst, og kan inneholde *sensitive opplysninger* som ikke bør fremkomme
          uten at medarbeideren gjør et aktivt og sporbart valg.

          Vi anbefaler **sterkt** at man benytter strukturert informasjon når mulig (kategorisering, nøkkelord etc), for bedre prioritering/styring av oppgavene, bedre statistikk og redusert risiko for eksponering av potensielt
          identifiserende og sensitiv informasjon for oppgaver man ikke nødvendigvis skal arbeide med.

          Dersom det ikke er mulig å ivareta brukernes behov uten å vise fritekstfeltene i lister, anbefales det at bruker selv aktivt velger i visningen,
          og at included *kun* tas med når aktivert. Dette både mtp. dataminimering og raskere responstid
        schema:
          uniqueItems: true
          type: array
          items:
            type: string
            enum:
            - kommentarer:siste
          enum:
          - kommentarer:siste
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SokOppgaverV5"
            examples:
              ? Søk etter de 10 neste oppgavene i køen av oppgaver fordelt til enhet
                2990, men ikke hverken til mappe eller medarbeider ved enheten
              : description: |
                  Søket støtter eksplisitt null for medarbeider og mappe, men støtter også operator $isNull som kanonisk form.
                  Ved utelatt felt i sin helhet, vil feltet *ikke* filtreres på.

                  I mange tilfeller vil det være ønskelig å ekskludere oppgaver som er satt på vent fra resultatet, som eksemplifisert her med $lte-operator (forutsatt at dd = 2026-04-17)

                  Det legges som hovedregel opp til "korrekt filtrering", fremfor at man sorterer på en delmengde av totalen. Det er kun fristDato og opprettet.tidspunkt som er sorterbare.
                  Dersom man av ulike årsaker har behov for å sortere på andre felt i tabellen, må man som tidligere ev. hente en større mengde,
                  f.eks 150 oppgaver og utfører sorteringen blant disse selv.

                  Dette av ytelseshensyn
                value:
                  filter:
                    fordeling.enhet.nr: "2990"
                    fordeling.medarbeider: null
                    fordeling.mappe: null
              Søk etter de 100 neste oppgavene ledige oppgavene ved enhet 2990:
                description: |
                  Økt limit, eksempelvis fordi det er ønskelig å vise flere oppgaver enn 10
                value:
                  filter:
                    fordeling.enhet.nr: "2990"
                    fordeling.medarbeider: null
                  page:
                    limit: 150
              Søk oppgaver fordelt til enhet 2990, medarbeider Z99999:
                description: |
                  En medarbeider vil sjelden være tildelt mer enn 0-10 oppgaver, men volumet er noe større for visse fagområder (og vil i eksepsjonelle tilfeller også kunne overstige 100).
                  Limit bevisst satt til 500, da det i dette tilfellet er ønskelig å finne *alle*. Som konsument må man likevel ta høyde for at det *kan* overstige limit, dvs. at man tilbyr mulighet for å hente
                  flere ved behov (hasNext=true).
                value:
                  filter:
                    fordeling:
                      enhet:
                        nr: "2990"
                      medarbeider:
                        navident: Z99999
                  page:
                    limit: 500
