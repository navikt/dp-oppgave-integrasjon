        tilgangAvvist:
          $ref: "#/components/schemas/TilgangAvvist"
    TilgangAvvist:
      type: object
      properties:
        begrunnelse:
          type: string
        kode:
          type: string
          enum:
          - AVVIST_STRENGT_FORTROLIG_ADRESSE
          - AVVIST_STRENGT_FORTROLIG_UTLAND
          - AVVIST_SKJERMING
          - AVVIST_FORTROLIG_ADRESSE
          - AVVIST_GEOGRAFISK
          - AVVIST_HABILITET
          - AVVIST_GENERISK
      description: "Inkluderes for oppgaver der tilgang er avvist for deler av resultatsettet.\
        \ Kun aktuelt for mer generelle søk, f.eks for visning i liste ved egen enhet.\
        \ Når tilgang er avvist, vil det returneres en skjermet representasjon av\
        \ oppgaven"
    EnhetDto:
      type: object
      properties:
        nr:
          maxLength: 4
          minLength: 4
          type: string
    PatchMeta:
      type: object
      properties:
        versjon:
          type: integer
          description: "Settes til gjeldende versjon for optimstisk låses. Bør normalt\
            \ sett angis, men det kan være noen unntak der f.eks en oppgave skal avsluttes\
            \ uavhengig av om noen har endret den"
          format: int32
        representerer:
          $ref: "#/components/schemas/Representerer"
        kommentar:
          type: string
    PatchOppgaveV2:
      required:
      - aktivDato
      - fordeling
      - kategorisering
      - nøkkelord
      - prioritet
      - status
      type: object
      properties:
        fordeling:
          $ref: "#/components/schemas/Fordeling"
        kategorisering:
          $ref: "#/components/schemas/Kategorisering"
        prioritet:
          $ref: "#/components/schemas/PrioritetV2"
        fristDato:
          type: string
          description: Oppgavens frist (ISO-8601). Kan ikke være < aktivDato
          format: date
          example: 2025-01-02
        aktivDato:
          type: string
          description: Spesifiseres iht ISO-8601 dersom oppgaven skal settes på /
            tas av vent. En oppgave med aktivDato frem i tid er satt på vent til den
            aktuelle datoen. AktivDato <= dd innebærer at oppgaven ikke er på vent.
            Kan ikke tilbakedateres til før dd
          format: date
          example: 2025-01-01
        nøkkelord:
          uniqueItems: true
          type: array
          items:
            type: string
            description: "Nøkkelord er en form for tagging av oppgaven for å skille\
              \ oppgaver fra hverandre der kategoriseringen ikke er tilstrekkelig.Dersom\
              \ taggingen er unik for et fagområde, bør det vurderes om det kan væ\
              re aktuelt med flere kategorier"
        status:
          type: string
          enum:
          - AAPEN
          - FERDIGSTILT
          - FEILREGISTRERT
        meta:
          $ref: "#/components/schemas/PatchMeta"
    Representerer:
      type: object
      properties:
        enhet:
          $ref: "#/components/schemas/EnhetDto"
      description: 'Skal angis når handlingen utføres av en medarbeider (OBO). Skal
        *ikke* angis når utføres av system (CCF) '
    OpprettOppgaveV2Request:
      required:
      - kategorisering
      type: object
      properties:
        fordeling:
          $ref: "#/components/schemas/Fordeling"
        kategorisering:
          $ref: "#/components/schemas/Kategorisering"
        beskrivelse:
          maxLength: 2500
          minLength: 2
          pattern: "^(?!.*---)[\\s\\S]*$"
          type: string
          description: |
            Beskrivelse av oppgaven som skal utføres.

            Når bekrivelsen genereres automatisk, er det viktig unngå personopplysninger som ikke er strengt nødvendige, og holde unngå unødvendig informasjon (f.eks lenke til eget system)
        prioritet:
          $ref: "#/components/schemas/PrioritetV2"
        fristDato:
          type: string
          description: "Oppgavens frist (valgfri, fristen settes til neste virkedag\
            \ hvis ikke oppgitt). Kan ikke være før dagens dato"
          format: date
        aktivDato:
          type: string
          description: |
            Angir når oppgaven skal bli aktiv/om den skal opprettes og settes på vent til angitt dato. Skal normalt sett ikke angis (oppgaven settes umiddelbart aktiv, hvis ikke oppgitt).
            Spesifikt for Fremlegg innen enkelte fagområder, men også for øvrige oppgaver der man f.eks venter på informasjon, kan et være aktuelt å sette denne frem i tid.

            Kan ikke være før dagens dato
          format: date
        nøkkelord:
          uniqueItems: true
          type: array
          items:
            type: string
            description: "Nøkkelord er en form for tagging av oppgaven for å skille\
              \ oppgaver fra hverandre der kategoriseringen ikke er tilstrekkelig.\
              \  Det bør vurderes om det bør etableres flere kategorier før man tagger\
              \ med nøkkelord. For automatiske prosesser der det genereres beskrivelse\
              \ som skiller oppgaver med lik kategorisering fra hverandre, og skillet\
              \ er relevant ift. oppgavestyringen anbefales det sterkt å ta i bruk\
              \ nøkkelord. Kan også i mange tilfeller  vurderes som en erstatning\
              \ for enhetsmapper, da nøkkelord kan benyttes i automatiske prosesser"
        bruker:
          $ref: "#/components/schemas/Bruker"
        arkivreferanse:
          $ref: "#/components/schemas/Arkivreferanse"
        tilknyttetSystem:
          maxLength: 20
          minLength: 0
          type: string
          description: "Systemet oppgaven er tilknyttet. Benyttes av fagsystemer nå\
            r det er ønskelig å skille oppgaven fra 'generelle oppgaver' som kan lø\
            ses i Gosys Muliggjør direktelenking når man benytter Gosys til å plukke\
            \ oppgaver, samt direktelenking fra det generelle oppgavebildet. Det vil\
            \ i tillegg settes begrensninger ift. hva man får lov til å gjøre i det\
            \ generelle oppgavebildet i Gosys (p.t sperres tema, oppgavetype og mulighet\
            \ til å ferdigstille oppgaven)"
        meta:
          $ref: "#/components/schemas/PostMeta"
    PostMeta:
      type: object
      properties:
        representerer:
          $ref: "#/components/schemas/Representerer"
        kommentar:
          maxLength: 2500
          minLength: 2
          pattern: "^(?!.*---)[\\s\\S]*$"
          type: string
          description: Dersom det skal legges til en kommentar relatert til handlingen
    Pagination:
      type: object
      properties:
        hasNext:
          type: boolean
        endCursor:
          type: string
        count:
          type: integer
          format: int32
    SokeresultatV2:
      type: object
      properties:
        oppgaver:
          type: array
          items:
            $ref: "#/components/schemas/OppgaveV2"
        pagination:
          $ref: "#/components/schemas/Pagination"
    Page:
      type: object
      properties:
        after:
          type: string
        limit:
          maximum: 1000
          type: integer
          format: int64
          default: 10
    SokOppgaverV5:
      type: object
      properties:
        filter:
          $ref: "#/components/schemas/JsonNode"
        page:
          $ref: "#/components/schemas/Page"
  securitySchemes:
    oidc:
      type: http
      description: "OIDC-token (JWT via OAuth2.0). Vi støtter CCF og OBO (Azure) for\
        \ nye konsumenter, samt nais-sts for eksisterende konsumenter som ikke enda\
        \ har hatt mulighet til å ta i bruk Azure CCF"
