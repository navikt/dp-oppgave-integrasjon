  /api/v2/oppgaver:
    post:
      tags:
      - v2 Oppgave (under arbeid)
      summary: BETA! Oppretter ny oppgave
      description: |
        V2 for opprettelse er i beta. Den benyttes i produksjon fra ny oppgaveløsning i Gosys, men ønsker tilbakemelding fra flere før vi definerer den som 100% stabil.
        Vi forutsetter at alle konsumenter i en beta-fase vil ha mulighet til å gjøre mindre justeringer ved behov, og at vi får feedback på hva som ev. oppleves bra eller tungvint.

        Dersom det skulle oppstå behov for endring i navngiving, struktur el som være breaking - vil dette utføres etter expand/contract, med en grace-periode på ca 1 uke. Nye felt/utvidelser
        forutsetter vi at konsument alltid håndterer

        Det er ønskelig at et begrenset sett med konsumenter - dvs konsumenter som enten skal sette opp en ny integrasjon mot oppgaveløsningen, eller som har nytte av endringene
        begynner å ta denne i bruk

        **Følgende er nytt/endret**

        - Modellen er endret til å ha en tydeligere struktur, der informasjon som hører sammen er gruppert
        - Legacy beskrivelseshistorikk (aka beskrivelse i v1) vil (i en overgangsfase, inntil beskrivelseshistorikken er endelig faset ut) automatisk populeres
        - Noe mer nøsting for samsvar med response-modell, der vi for kodeverk, mapper (og på sikt enhet og ev. medarbeider) eksponerer navn for å redusere behov for ekstra oppslag.
        - Støtte for nøkkelord
        - Støtte for å registrere en kommentar i tillegg til beskrivelse
        - Idempotency-støtte for automatisk retry
        - Strengere validering for å redusere feilkilder
        - Avvisning av duplikate oppgaver for dokumenthåndtering (journalføring, fordeling) når det allerede er opprettet en
        - RFC 9457 (Problem details) ved feil
        - Mer presis bruk av response-koder ved feil
        - Forbedret dokumentasjon, og eksempler

        **Følgende støttes foreløpig ikke i v2**
            - Det er ikke mulig å oppdatere "metadata" som definert i v1 (utvidelser som benyttes av et fåtall systemer). Ønsker å kartlegge behov for dette både for eksisterende konsumenter,
            samt om det kan være aktuelt med mindre justeringer slik at fagsystemer med enkle utvidelsesbehov lettere kan ta i bruk dette fremfor å lage en 'paralell-løsning' kun for å få med et ekstra felt eller to
        Se eksemplene under for mer informasjon om ulike brukstilfeller.

        **Om bruk av beskrivelsesfeltet**

        Beskrivelsen skal inneholde informasjon som er nyttig for den som skal løse oppgaven. Typisk informasjon som sier noe om hvorfor oppgaven
         er opprettet og/eller hva som skal gjøres. Beskrivelsen skal *ikke* populeres med strukturerte formater (json, csv osv),
        og det skal *ikke* genereres "headere" (ulike varianter av --- <timestamp> --- <newline>),
        eller forøvrig inkluderes informasjon som i tillegg lagres strukturert eller kan utledes (f.eks lenke til saken i fagsystemet)

        Beskrivelsen er heller ikke en egnet mekanisme for å skille oppgaver fra hverandre mtp. hvem som skal plukke den og/eller for å sikre riktig prioritet.
        Dette gjøres vha. kategorisering, bruk av nøkkelord, prioritet osv.

        Merk at beskrivelse i v2 teknisk sett er et separat felt fra friteksthistorikken tilgjengeliggjort i beskrivelses-feltet i v1.
        I en overgangsfase blir også dette feltet populert, og for oppgaver opprettet med OBO-token, vil det i tillegg
        populeres med header som angir timestamp, bruker og enhet for bakoverkompatibilitet.

        **Om kategorisering av oppgaven**

        Husk at oppgaven skal kategoriseres så presist som mulig (se: [kodeverk](/#/Kodeverk/hentKodeverk) for å sikre
        at den havner i riktig kø. Dersom det ikke er mulig/ønskelig å utvide kodeverket, men kategoriseringen likevel er utilstrekkelig, anbefaler
        vi at nøkkelord tas i bruk. Disse er i motsetning til beskrivelsen mulig å filtrere på - og etablere egne køer for.

        **Om feilkoder**

        Problem details ([RFC 9457](https://www.rfc-editor.org/rfc/rfc9457.html) benyttes for feil. Ved feil, bør konsument logge svaret i sikker logg.
        Det er ikke meningen at responsen - eller deler av denne eksponeres direkte mot sluttbruker for 4xx-feil, denne er ment for å bistå utviklere
        i feilsøk.
      operationId: opprettOppgave_1
      parameters:
      - name: Idempotency-Key
        in: header
        description: |
          Nøkkel (UUID v4) som kan sendes med for å ivareta idempotens

          Det anbefales at konsumenter som har automatiske retry-mekanismer tar i bruk dette for å unngå opprettelse av duplikater.

          Dersom en oppgave med samme nøkkel allerede er opprettet, vil oppgaven returneres i nåværende tilstand (som om det ble utført en GET)
        schema:
          type: string
          format: uuid
      - name: include
        in: query
        description: Angis dersom det er behov for å inkludere ekstra-verdier i responsen
        schema:
          type: array
          items:
            type: string
            description: Tillatte verdier for enkeltoppslag
            enum:
            - kommentarer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpprettOppgaveV2Request"
            examples:
              Opprett oppgave (Journalføring, CCF):
                description: |
                  **Om eksemplet**

                  bruker.ident må endres til ident fra Dolly for at oppgaven skal kunne opprettes.
                  Det er per i dag ingen validering mot arkivet; arkivereferanse.journalpostid må settes til journalpostid i fagarkivet/joark
                  for en "mottatt" journalpost, for at oppgaven skal kunne behandles.

                  **Om journalføringsoppgaver**

                  Ved journalføring skal det settes behandlingstema og behandlingstype basert på det aktuelle skjemaet, og det vil normalt
                  sett ikke være nødvendig å angi fordeling, da løsningen automatisk vil fordele iht. gjeldende regelsett.

                  Dette inkluderer spesialregler for adressebeskyttelse, egne ansatte, fordeling iht. bosted etc.

                  Det finnes noen unntak (ikke nødvendigvis utfyllende):
                   - Medarbeider har aktivt valgt at oppgaven skal et annet sted enn foreslått (typisk ifm. uttak av førsteside)
                   - Oppgaver som skal til oppfølgingskontor, og ikke til navkontor (reglene baserer seg på navkontor, så disse vil kunne havne feil)
                   - Oppgaver tilknyttet Arbeidsgiver (vil vanligvis ikke la seg automatisk fordele)

                  Dersom oppgaven ikke lar seg fordele, returneres 422, og konsument må ta stilling til hva som er riktig. I de fleste
                  tilfeller vil det korrekte være å opprette en fordelingsoppgave

                  Merk at det ikke skal dannes journalføring - eller fordelingsoppgave for dokumenter som allerede er journalført.

                  Det skal heller ikke dannes journalføring - eller fordelingsoppgave når det allerede en slik oppgave knyttet til journalposten. Dersom man forsøker
                  dette, vil man avvises med 409.
                value:
                  beskrivelse: Søknad om grunnstønad
                  kategorisering:
                    tema:
                      kode: GRU
                    oppgavetype:
                      kode: JFR
                    behandlingstema:
                      kode: ab0132
                    behandlingstype:
                      kode: ae0034
                  bruker:
                    ident: "99999999999"
                    type: PERSON
                  arkivreferanse:
                    journalpostId: "111222333"
              Opprett generell oppgave (CCF):
                description: |
                  Eksempel på oppgave opprettet automatisk som følge av hendelse, der oppgaven skal/kan løses i Gosys.
                  Konsument har implementert automatisk retry, så her ønsker konsument å sende med Idempotency-Key i header.

                  Oppgaven er knyttet både til journalpost og sak i arkivet slik at medarbeider raskt kan finne grunnlaget for refusjonskravet
                value:
                  beskrivelse: Brukeren er innvilget etterbetaling av AAP fra 01.01.2025
                    til 15.03.2026. Dere må sende refusjonskrav til NØS.
                  kategorisering:
                    tema:
                      kode: AAP
                    oppgavetype:
                      kode: VUR_KONS_YTE
                    behandlingstema:
                      kode: ab0504
                  bruker:
                    ident: "99999999999"
                    type: PERSON
                  arkivreferanse:
                    saksnr: "1234"
                    journalpostId: "111222333"
              Opprett oppgave tilknyttet fagsystem (CCF):
                description: |
                  Eksempel på oppgave opprettet automatisk som følge av en hendelse.

                  Når en oppgave knyttes mot et system, påvirker dette visse funksjoner i Gosys:
                  * Hvilke endringer som kan gjøres på oppgaven blir begrenset.
                  * Det blir mulig å filtrere/sette opp køer som inkluderer eller ekskluderer oppgavene.
                  * For systemer der man plukker oppgaver i Gosys, muliggjør dette lenking inn mot det aktuelle fagsystemet.

                  I dette tilfellet er inntekt sentralt ift. prioritering og/eller kompetanseprofil for den som skal løses oppgaven, og benyttes
                  som nøkkelord slik at det blir enkelt å finne "inntektsrelaterte" oppgaver.

                  Oppgaven er knyttet både til en journalpost og sak i arkivet. Knytningen mot journalpost vil medføre at dokumentet tilgjengeliggjøres i Gosys,
                  mens knytningen mot saken i arkivet medfører at det blir lettere å finne igjen denne - og ev. andre oppgaver for samme sak.
                value:
                  beskrivelse: Søknad om supplerende stønad
                  kategorisering:
                    tema:
                      kode: SUP
                    oppgavetype:
                      kode: BEH_SAK
                    behandlingstema:
                      kode: ab0431
                    behandlingstype:
                      kode: ae0245
                  bruker:
                    ident: "99999999999"
                    type: PERSON
                  arkivreferanse:
                    saksnr: "1234"
                    journalpostId: "111222333"
                  tilknyttetSystem: SUPSTONAD
              Opprett oppgave (OBO):
                description: |
                  Frist må endres til >= dagens dato. Fristen er datoen medarbeider skal ha svart ut oppgaven,
                  og oppgaver der fristen er passert vil markeres i f.eks Gosys. Dette er i tillegg en verdi
                  det kan hentes ut statistikk for. Frist er i mange tilfeller knyttet opp mot manuelle rutiner for fagområdet.

                  Eksempel på oppgave opprettet av medarbeider. Normalt sett bør fordeling synliggjøres for medarbeider og sendes med i request når oppgaver opprettes
                  manuelt. Det er imidlertid viktig at løsningen legger opp til at enhet iht. arbeidsfordeling er førstevalg og at man får en
                  tydelig advarsel når det forsøkes en feiloverføring. Det finnes p.t noen unntak der regelsettet ikke er helt komplett, i.e
                  Navkontor, ROL

                  Merk at det er påkrevd å sende med meta-info om enhet (Norg2) medarbeider representerer ifm. opprettelsen
                value:
                  beskrivelse: Bruker ber om å bli kontaktet ifm. siste utbetaling
                    av dagpenger
                  fordeling:
                    enhet:
                      nr: "4151"
                  kategorisering:
                    tema:
                      kode: STO
                    oppgavetype:
                      kode: VURD_HENV
                    behandlingstema:
                      kode: ab0356
                  bruker:
                    ident: "11111111111"
                    type: PERSON
                  fristDato: 2025-01-02
                  meta:
                    representerer:
                      enhet:
                        nr: "2990"
