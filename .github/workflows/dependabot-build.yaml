name: Test Dependabot PRs

on:
  push:
    branches:
      - 'dependabot/**'
      - 'update-digests'

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6.2.0
      - run: ./gradlew --configuration-cache test
